name: Update Phrase Orders Dashboard

on:
  schedule:
    - cron: '0 7 * * *'   # every day at 7:00 UTC
  workflow_dispatch:        # also allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run dashboard script
        env:
          PHRASE_TOKEN: ${{ secrets.PHRASE_TOKEN }}
        run: |
          sed -i "s/PHRASE_TOKEN = \"YOUR_API_TOKEN_HERE\"/PHRASE_TOKEN = \"$PHRASE_TOKEN\"/" phrase_orders_dashboard.py
          python phrase_orders_dashboard.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          include_files: phrase_orders_dashboard.html
